version: "3.9"

services:
  postgres:
    image: postgres:17-alpine
    restart: always
    volumes:
      - postgres_data:/var/lib/postgresql/data
    env_file:
      - .env
    environment:
      POSTGRES_USER: ${POSTGRES_USER}
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD}
      POSTGRES_DB: ${POSTGRES_DB}
    networks:
      - app_network
    ports:
      - "5436:5432"
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U ${POSTGRES_USER} -d ${POSTGRES_DB}"]
      interval: 5s
      timeout: 5s
      retries: 5

  app:
    build: .
    container_name: blog_app
    volumes:
      - ./src:/app/src
      - ./images:/images
      - ./media:/app/media
      - ./alembic:/app/alembic
    env_file:
      - .env
    ports:
      - "8020:8000"
    depends_on:
      postgres:
        condition: service_healthy
    networks:
      - app_network
    entrypoint: sh -c "./src/start.sh"

networks:
  app_network:
    driver: bridge

volumes:
  postgres_data: